name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            preset: linux
          - os: macos-latest
            preset: macos
          - os: windows-latest
            preset: windows

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.preset }}

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 14 (Linux)
        if: matrix.preset == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14
          echo "CC=gcc-14" >> $GITHUB_ENV
          echo "CXX=g++-14" >> $GITHUB_ENV

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
